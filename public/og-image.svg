<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#02261e" />
  <!-- subtle brand glow -->
  <circle cx="980" cy="140" r="280" fill="#00805a" opacity="0.25" />
  <circle cx="200" cy="560" r="240" fill="#11a774" opacity="0.18" />

  <!-- arch mark -->
  <g transform="translate(96 210)" fill="none" stroke="#34c790" stroke-linecap="round">
