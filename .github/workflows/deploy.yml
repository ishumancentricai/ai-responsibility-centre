name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # BASE_PATH = "/<repo-name>/" so assets resolve on the project page.
        # When you attach a custom domain, set CUSTOM_DOMAIN below (or a repo
        # variable) and the base becomes "/".
        run: npm run build
        env:
          BASE_PATH: ${{ vars.CUSTOM_DOMAIN && '/' || format('/{0}/', github.event.repository.name) }}

      - name: Add SPA 404 fallback
        # HashRouter doesn't strictly need this, but it keeps deep links safe.
        run: cp dist/index.html dist/404.html

      - name: Add CNAME (only if a custom domain is configured)
        if: vars.CUSTOM_DOMAIN != ''
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
